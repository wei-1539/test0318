  <!-- thing09-6 固定在畫面底部 S -->
  <script>
    (function () {
      const orig = document.querySelector('.thing09-6');
      const range = document.getElementById('bg09-43-range');
      if (!orig || !range) return;

      const clone = orig.cloneNode(true);
      clone.classList.remove('absolute');
      clone.style.cssText = 'position:relative;top:auto;';

      // 強制載入圖片（bypass lazy）
      clone.querySelectorAll('img[data-src]').forEach(function (img) {
        img.src = img.dataset.src;
      });

      const wrapper = document.createElement('div');
      wrapper.style.cssText =
        'position:fixed;bottom:0;left:50%;transform:translateX(-50%);' +
        'width:100%;max-width:1000px;z-index:200;display:none;pointer-events:none;';
      wrapper.appendChild(clone);
      document.body.appendChild(wrapper);

      window.addEventListener('scroll', function () {
        const origBottom = orig.getBoundingClientRect().bottom;
        const rangeRect = range.getBoundingClientRect();
        // 已滑過 thing09-6，且還在 bg09-43-range 內
        const show = origBottom < 0 && rangeRect.bottom > 0;
        wrapper.style.display = show ? 'block' : 'none';
      });
    })();
  </script>
  <!-- thing09-6 固定在畫面底部 E -->
